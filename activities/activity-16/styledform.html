<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signup Form</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1>Account Signup</h1>
    <nav>
        <a href="#">Home</a>
        <a href="#">Signup</a>
    </nav>
</header>

<main>
    <form action="#" method="post">

        <fieldset>
            <legend>Personal Information</legend>

            <div class="form-row">
                <label for="name">Full Name</label>
                <input type="text" id="name" name="name" placeholder="Enter your name" required>
            </div>

            <div class="form-row">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" placeholder="Enter your email" required>
            </div>

            <div class="form-row">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="Enter your password" required>
            </div>

            <div class="form-row">
                <label for="dob">Date of Birth</label>
                <input type="date" id="dob" name="dob">
            </div>

            <div class="form-row">
                <label for="phone">Phone</label>
                <input type="tel" id="phone" name="phone" placeholder="(123) 456-7890">
            </div>

        </fieldset>
    
        <fieldset>
            <legend>Preferences</legend>

            <div class="form-row">
                <label>Gender</label>
                <div class="inline-group">
                    <label><input type="radio" name="gender" value="male"> Male</label>
                    <label><input type="radio" name="gender" value="female"> Female</label>
                </div>
            </div>
          

            <div class="form-row">
                <label for="class">Favorite Class</label>
                <select id="class" name="class">
                    <option value="">Select one</option>
                    <option value="marketing">Marketing</option>
                    <option value="psychology">Psychology</option>
                    <option value="art">Art</option>
                </select>
            </div>

            <div class="form-row">
                <label>Skills</label>
                <div class="inline-group">
                    <label><input type="checkbox" name="skills" value="design"> Design</label>
                    <label><input type="checkbox" name="skills" value="writing"> Writing</label>
                    <label><input type="checkbox" name="skills" value="coding"> Coding</label>
                </div>
            </div>

            <div class="form-row">
                <label for="comments">Comments</label>
                <textarea id="comments" name="comments" rows="4"></textarea>
            </div>

            <div class="form-row">
                <label for="terms">Terms</label>
                <div class="inline-group">
                    <input type="checkbox" id="terms" name="terms" required>
                    <span>Agree to terms</span>
                </div>
            </div>

        </fieldset>

        <div class="form-row">
            <label></label>
            <button type="submit">Submit</button>
        </div>

    </form>
</main>

<footer>
    <p>2026 Account Signup Form</p>
</footer>

</body>
</html>
