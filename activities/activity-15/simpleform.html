<!DOCTYPE html>
<html>
<head>
  <title>Simple Form Activity</title>
</head>

<body>
  <h2>Contact Form</h2>

  <form>
    <label for="name">Name:</label>
    <input type="text" id="name" name="name" placeholder="Enter your name">
        <br><br>
    <label for="email">Email:</label>
    <input type="email" id="email" name="email" placeholder="Enter your email">

        <br><br>

    <p>Gender:</p>
    <input type="radio" id="male" name="gender" value="male">
    <label for="male">Male</label>

    <input type="radio" id="female" name="gender" value="female">
    <label for="female">Female</label>

         <br><br>

    <label for="class">Favorite Class:</label>
    <select id="class" name="class">
      <option value="marketing">Marketing</option>
      <option value="psychology">Psychology</option>
      <option value="design">Computer Science</option>
      <option value="finance">Art</option>
    </select>

    <br><br>

    <p>Skills:</p>
    <input type="checkbox" id="html" name="skills" value="HTML">
    <label for="html">HTML</label>

    <input type="checkbox" id="css" name="skills" value="CSS">
    <label for="css">CSS</label>

    <input type="checkbox" id="js" name="skills" value="JavaScript">
    <label for="js">JavaScript</label>
    
         <br><br>

    <label for="message">Message:</label>
        <br><br>
    <textarea id="message" name="message" rows="4" cols="30" placeholder="Enter your message"></textarea>

     <br><br>

    <input type="submit" value="Submit">
  </form>
</body>
</html>
